<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>10x-dev</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    </head>
    <body>
        <div class="container mt-3">
            <div class="col">
                <div class="row">
                    <label for="prompt" class="form-label">Prompt</label>
                    <input type="text" class="form-control" id="prompt" placeholder="Generate a basic nodejs server">
                    <button type="submit" class="btn btn-primary" id="generate">Generate</button>
                </div>
                <div class="row mt-3">
                    <label for="output">Output</label>
                    <input type="text" class="form-control" id="output" readonly>
                    <button type="reset" class="btn btn-primary" id="clear">Clear</button>
                </div>
            </div>
        </div>

        <script src="assets/js/index.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    </body>
</html>
